<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    article {
      background: #111827;
      width: 100%;
      max-width: 800px;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      gap: 20px;
      flex-direction: row;
    }

    @media (max-width: 600px) {
      article {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
    }

    figure {
      margin: 0;
    }

    img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3b82f6;
    }

    header h2 {
      margin: 0;
      font-size: 24px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
      display: inline-block;
      margin-right: 10px;
    }

    a:focus {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }

    section {
      margin-top: 10px;
    }

    ul {
      padding-left: 20px;
    }

    .time {
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<article data-testid="test-profile-card">

  <!-- Avatar -->
  <figure>
    <img
      src="https://i.pravatar.cc/150?img=12"
      alt="User profile avatar"
      data-testid="test-user-avatar"
    />
  </figure>

  <!-- Content -->
  <div style="flex:1">

    <header>
      <h2 data-testid="test-user-name">Favour Adedoyin</h2>
    </header>

    <p data-testid="test-user-bio">
      Frontend developer passionate about building accessible and responsive web applications using modern web technologies.
    </p>

    <!-- Time -->
    <p class="time" aria-live="polite" data-testid="test-user-time"></p>

    <!-- Social links -->
    <nav data-testid="test-user-social-links">
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"
         data-testid="test-user-social-twitter">Twitter</a>

      <a href="https://github.com" target="_blank" rel="noopener noreferrer"
         data-testid="test-user-social-github">GitHub</a>

      <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer"
         data-testid="test-user-social-linkedin">LinkedIn</a>
    </nav>

    <!-- Hobbies -->
    <section>
      <h3>Hobbies</h3>
      <ul data-testid="test-user-hobbies">
        <li>Coding</li>
        <li>Reading</li>
        <li>Listening to music</li>
      </ul>
    </section>

    <!-- Dislikes -->
    <section>
      <h3>Dislikes</h3>
      <ul data-testid="test-user-dislikes">
        <li>Procrastination</li>
        <li>Disorganization</li>
        <li>Slow websites</li>
      </ul>
    </section>

  </div>
</article>

<script>
  const timeEl = document.querySelector('[data-testid="test-user-time"]');

  function updateTime() {
    timeEl.textContent = Date.now();
  }

  updateTime();
  setInterval(updateTime, 1000);
</script>

</body>
</html>
