<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<article data-testid="test-profile-card">

  <!-- Avatar -->
  <figure>
    <img
      src="\unnamed (8) (1).jpg"
      alt="User profile avatar"
      data-testid="test-user-avatar"
    />
  </figure>

  <!-- Content -->
  <div style="flex:1">

    <header>
      <h2 data-testid="test-user-name">Favour Adedoyin</h2>
    </header>

    <p data-testid="test-user-bio">
      Frontend developer passionate about building accessible and responsive web applications using modern web technologies.
    </p>

    <!-- Time -->
    <p class="time" aria-live="polite" data-testid="test-user-time"></p>

    <!-- Social links -->
    <nav data-testid="test-user-social-links">
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"
         data-testid="test-user-social-twitter">Twitter</a>

      <a href="https://github.com" target="_blank" rel="noopener noreferrer"
         data-testid="test-user-social-github">GitHub</a>

      <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer"
         data-testid="test-user-social-linkedin">LinkedIn</a>
    </nav>

    <!-- Hobbies -->
    <section>
      <h3>Hobbies</h3>
      <ul data-testid="test-user-hobbies">
        <li>Coding</li>
        <li>Reading</li>
        <li>Listening to music</li>
      </ul>
    </section>

    <!-- Dislikes -->
    <section>
      <h3>Dislikes</h3>
      <ul data-testid="test-user-dislikes">
        <li>Procrastination</li>
        <li>Disorganization</li>
        <li>Slow websites</li>
      </ul>
    </section>

  </div>
</article>

<script src="script.js"></script>

</body>
</html>
